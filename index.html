<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO usluge — Uskoro</title>
<meta name="description" content="AI web stranice i poslovne automatizacije za lokalne poduzetnike. Uskoro online.">
<meta name="robots" content="noindex, nofollow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .logo {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }

  .logo span {
    background: linear-gradient(135deg, #E63946, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 0.85rem;
    color: #666;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: linear-gradient(135deg, #E63946, #C1121F);
    border-radius: 2px;
    margin: 0 auto 48px;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .sub {
    color: #888;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 48px;
  }

  .contacts {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .contact-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: #ccc;
    text-decoration: none;
    font-size: 0.95rem;
    padding: 12px 24px;
    border: 1px solid #222;
    border-radius: 10px;
    width: 100%;
    max-width: 280px;
    transition: border-color 0.2s, color 0.2s;
  }

  .contact-link:hover {
    border-color: #E63946;
    color: #fff;
  }

  .contact-link .icon {
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 56px;
    font-size: 0.75rem;
    color: #444;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">YOLO <span>usluge</span></div>
  <div class="tagline">AI web stranice &amp; automatizacije</div>

  <div class="divider"></div>

  <h1>Stranica<br>u izradi</h1>
  <p class="sub">Radimo na nečemu zanimljivom.<br>Za sva pitanja — slobodno nas kontaktirajte.</p>

  <div class="contacts">
    <a href="tel:+38598184061" class="contact-link">
      <span class="icon">📞</span>
      <span>+385 98 184 061</span>
    </a>
    <a href="mailto:hrvoje@yolo-usluge.hr" class="contact-link">
      <span class="icon">✉️</span>
      <span>hrvoje@yolo-usluge.hr</span>
    </a>
    <a href="https://www.instagram.com/yolousluge" target="_blank" rel="noopener" class="contact-link">
      <span class="icon">📷</span>
      <span>@yolousluge</span>
    </a>
  </div>

  <div class="footer">&copy; 2026 YOLO obrt, Pula</div>

</div>
</body>
</html>
