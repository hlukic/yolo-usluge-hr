<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#E63946;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <rect width="420" height="100" fill="#0a0a0a" rx="10"/>

  <!-- YOLO text -->
  <text x="20" y="65" font-family="'Arial Black', sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="-2">YOLO</text>

  <!-- AI Neural icon — circle with neural network inside -->
  <!-- Outer circle -->
  <circle cx="210" cy="50" r="32" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.4"/>
  <circle cx="210" cy="50" r="26" fill="rgba(230,57,70,0.08)" stroke="#E63946" stroke-width="1" opacity="0.6"/>

  <!-- Neural nodes -->
  <circle cx="210" cy="26" r="4" fill="#E63946"/>
  <circle cx="228" cy="38" r="3.5" fill="#E63946" opacity="0.8"/>
  <circle cx="228" cy="62" r="3.5" fill="#E63946" opacity="0.8"/>
  <circle cx="210" cy="74" r="4" fill="#E63946"/>
  <circle cx="192" cy="62" r="3.5" fill="#E63946" opacity="0.8"/>
  <circle cx="192" cy="38" r="3.5" fill="#E63946" opacity="0.8"/>
  <!-- Center node -->
  <circle cx="210" cy="50" r="5" fill="#E63946"/>

  <!-- Neural connections -->
  <line x1="210" y1="30" x2="210" y2="45" stroke="#E63946" stroke-width="1" opacity="0.5"/>
  <line x1="225" y1="41" x2="215" y2="47" stroke="#E63946" stroke-width="1" opacity="0.5"/>
  <line x1="225" y1="59" x2="215" y2="53" stroke="#E63946" stroke-width="1" opacity="0.5"/>
  <line x1="210" y1="70" x2="210" y2="55" stroke="#E63946" stroke-width="1" opacity="0.5"/>
  <line x1="195" y1="59" x2="205" y2="53" stroke="#E63946" stroke-width="1" opacity="0.5"/>
  <line x1="195" y1="41" x2="205" y2="47" stroke="#E63946" stroke-width="1" opacity="0.5"/>

  <!-- usluge text -->
  <text x="258" y="65" font-family="'Arial Black', sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="-2">usluge</text>
</svg>
