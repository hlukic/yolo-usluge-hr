<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#C1121F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="420" height="100" fill="#0a0a0a" rx="10"/>

  <!-- YOLO -->
  <text x="20" y="65" font-family="'Arial Black', sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="-2">YOLO</text>

  <!-- Stylized brain made of connected dots — "AI mind" -->
  <!-- Outer glow ring -->
  <circle cx="210" cy="50" r="30" fill="none" stroke="rgba(230,57,70,0.15)" stroke-width="8"/>

  <!-- Brain outline using bezier curves -->
  <path d="M210 24
           C218 24, 228 28, 232 36
           C237 44, 235 52, 230 57
           C235 62, 234 70, 228 73
           C222 76, 215 73, 210 70
           C205 73, 198 76, 192 73
           C186 70, 185 62, 190 57
           C185 52, 183 44, 188 36
           C192 28, 202 24, 210 24 Z"
        fill="none" stroke="#E63946" stroke-width="2" filter="url(#glow)"/>

  <!-- Center split -->
  <line x1="210" y1="26" x2="210" y2="68" stroke="rgba(230,57,70,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Brain folds/gyri - left -->
  <path d="M192 38 Q196 34 201 37" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <path d="M189 50 Q194 46 199 49" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <path d="M191 62 Q195 58 200 61" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>

  <!-- Brain folds/gyri - right -->
  <path d="M228 38 Q224 34 219 37" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <path d="M231 50 Q226 46 221 49" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>
  <path d="M229 62 Q225 58 220 61" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7"/>

  <!-- Glowing center dot -->
  <circle cx="210" cy="50" r="4" fill="#E63946" filter="url(#glow)"/>

  <!-- usluge -->
  <text x="258" y="65" font-family="'Arial Black', sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="-2">usluge</text>
</svg>
