<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="200" height="120" fill="#0a0a0a" rx="8"/>

  <!-- Stacked layout: centered -->
  <!-- Top label -->
  <text x="100" y="28" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="#666" letter-spacing="6" text-anchor="middle">◆ OBRT ◆</text>

  <!-- Big YOLO -->
  <text x="100" y="78" font-family="'Arial Black', sans-serif" font-weight="900" font-size="58" fill="#ffffff" letter-spacing="-2" text-anchor="middle">YOLO</text>

  <!-- Bottom: usluge with gradient line on each side -->
  <line x1="14" y1="96" x2="60" y2="96" stroke="url(#g1)" stroke-width="1.5"/>
  <text x="100" y="100" font-family="Arial, sans-serif" font-weight="400" font-size="12" fill="#E63946" letter-spacing="5" text-anchor="middle">USLUGE</text>
  <line x1="140" y1="96" x2="186" y2="96" stroke="url(#g1)" stroke-width="1.5"/>
</svg>
