<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO usluge — Logo preview</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 60px 40px; }
  h1 { color: #E63946; margin-bottom: 48px; font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; }
  .grid { display: flex; flex-direction: column; gap: 40px; max-width: 700px; }
  .card { border: 1px solid #2a2a2a; border-radius: 16px; padding: 48px 40px; }
  .label { font-size: 0.7rem; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 32px; }
  .dark { background: #0a0a0a; }
  .light { background: #f2f2f2; }

  /* ---- LOGO ---- */
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    line-height: 1;
  }

  .logo-yolo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: #CC1418;
    letter-spacing: 2px;
  }

  .logo-usluge-dark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: #ffffff;
    letter-spacing: 2px;
  }

  .logo-usluge-light {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: #111111;
    letter-spacing: 2px;
  }

  .logo-icon {
    margin: 0 10px;
    position: relative;
    top: -3px;
  }
</style>
</head>
<body>

<h1>YOLO usluge — Logo varijante</h1>

<div class="grid">

  <!-- DARK -->
  <div class="card dark">
    <div class="label">Tamna pozadina</div>
    <div class="logo-wrap">
      <span class="logo-yolo">YOLO</span>

      <div class="logo-icon">
        <svg width="100" height="72" viewBox="0 0 100 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- EKG line -->
          <polyline
            points="0,38 18,38 28,6 40,68 50,38 64,38"
            stroke="#ffffff" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
          <!-- Vertical bar -->
          <line x1="64" y1="18" x2="64" y2="56" stroke="#CC1418" stroke-width="3.5" stroke-linecap="round"/>
          <!-- Branch 1 -->
          <line x1="64" y1="20" x2="82" y2="20" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="20" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
          <!-- Branch 2 -->
          <line x1="64" y1="38" x2="82" y2="38" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="38" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
          <!-- Branch 3 -->
          <line x1="64" y1="56" x2="82" y2="56" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="56" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
        </svg>
      </div>

      <span class="logo-usluge-dark">usluge</span>
    </div>
  </div>

  <!-- LIGHT -->
  <div class="card light">
    <div class="label" style="color:#aaa">Svijetla pozadina</div>
    <div class="logo-wrap">
      <span class="logo-yolo">YOLO</span>

      <div class="logo-icon">
        <svg width="100" height="72" viewBox="0 0 100 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- EKG line -->
          <polyline
            points="0,38 18,38 28,6 40,68 50,38 64,38"
            stroke="#111111" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
          <!-- Vertical bar -->
          <line x1="64" y1="18" x2="64" y2="56" stroke="#CC1418" stroke-width="3.5" stroke-linecap="round"/>
          <!-- Branch 1 -->
          <line x1="64" y1="20" x2="82" y2="20" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="20" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
          <!-- Branch 2 -->
          <line x1="64" y1="38" x2="82" y2="38" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="38" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
          <!-- Branch 3 -->
          <line x1="64" y1="56" x2="82" y2="56" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="56" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
        </svg>
      </div>

      <span class="logo-usluge-light">usluge</span>
    </div>
  </div>

  <!-- DARK SMALL — kako izgleda u navu -->
  <div class="card dark">
    <div class="label">Nav veličina (~32px)</div>
    <div class="logo-wrap" style="transform-origin: left center; transform: scale(0.38);">
      <span class="logo-yolo">YOLO</span>
      <div class="logo-icon">
        <svg width="100" height="72" viewBox="0 0 100 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,38 18,38 28,6 40,68 50,38 64,38" stroke="#ffffff" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
          <line x1="64" y1="18" x2="64" y2="56" stroke="#CC1418" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="64" y1="20" x2="82" y2="20" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="20" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
          <line x1="64" y1="38" x2="82" y2="38" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="38" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
          <line x1="64" y1="56" x2="82" y2="56" stroke="#CC1418" stroke-width="3" stroke-linecap="round"/>
          <circle cx="89" cy="56" r="6" stroke="#CC1418" stroke-width="3" fill="none"/>
        </svg>
      </div>
      <span class="logo-usluge-dark">usluge</span>
    </div>
  </div>

</div>

</body>
</html>
