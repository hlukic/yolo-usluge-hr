<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO usluge — Logo preview</title>
<style>
  body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 40px; }
  h1 { color: #E63946; margin-bottom: 40px; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 1100px; }
  .card { border: 1px solid #222; border-radius: 16px; padding: 40px 32px; }
  .card h2 { font-size: 0.72rem; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px; }
  .dark { background: #0a0a0a; }
  .light { background: #f0f0f0; }
  .logo-wrap img { max-width: 100%; height: auto; }
</style>
</head>
<body>

<h1>YOLO usluge — Finalni logo</h1>

<div class="grid">

  <div class="card dark">
    <h2>Tamna pozadina</h2>
    <div class="logo-wrap">
      <img src="logo-final-dark.svg" alt="Logo dark">
    </div>
  </div>

  <div class="card light">
    <h2>Svijetla pozadina</h2>
    <div class="logo-wrap">
      <img src="logo-final-light.svg" alt="Logo light">
    </div>
  </div>

</div>

</body>
</html>
