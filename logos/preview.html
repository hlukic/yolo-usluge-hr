<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO usluge — Logo varijante</title>
<style>
  body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 40px; }
  h1 { color: #E63946; margin-bottom: 40px; font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 32px; }
  .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 32px; }
  .card:hover { border-color: #E63946; }
  .card h2 { font-size: 0.75rem; color: #666; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px; }
  .logo-wrap { display: flex; align-items: center; justify-content: center; min-height: 120px; }
  .logo-wrap img { max-width: 100%; height: auto; }
  .variants { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }
  .badge { font-size: 0.7rem; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.4); color: #E63946; padding: 3px 10px; border-radius: 100px; }
</style>
</head>
<body>

<h1>YOLO usluge — Logo varijante</h1>

<div class="grid">

  <div class="card">
    <h2>V1 — Wordmark s točkom</h2>
    <div class="logo-wrap">
      <img src="logo-v1-wordmark.svg" alt="Logo V1">
    </div>
    <div class="variants">
      <span class="badge">Čist</span>
      <span class="badge">Profesionalan</span>
    </div>
  </div>

  <div class="card">
    <h2>V2 — Icon + Wordmark</h2>
    <div class="logo-wrap">
      <img src="logo-v2-icon-text.svg" alt="Logo V2">
    </div>
    <div class="variants">
      <span class="badge">Prepoznatljiv</span>
      <span class="badge">Versatilan</span>
    </div>
  </div>

  <div class="card">
    <h2>V3 — Lightning / AI koncept</h2>
    <div class="logo-wrap">
      <img src="logo-v3-lightning.svg" alt="Logo V3">
    </div>
    <div class="variants">
      <span class="badge">Energičan</span>
      <span class="badge">Tech feel</span>
    </div>
  </div>

  <div class="card">
    <h2>V4 — Minimal underline</h2>
    <div class="logo-wrap">
      <img src="logo-v4-minimal.svg" alt="Logo V4">
    </div>
    <div class="variants">
      <span class="badge">Minimalan</span>
      <span class="badge">Modern</span>
    </div>
  </div>

  <div class="card">
    <h2>V5 — Stacked / Centered</h2>
    <div class="logo-wrap">
      <img src="logo-v5-stacked.svg" alt="Logo V5">
    </div>
    <div class="variants">
      <span class="badge">Bold</span>
      <span class="badge">Symmetričan</span>
    </div>
  </div>

</div>

</body>
</html>
