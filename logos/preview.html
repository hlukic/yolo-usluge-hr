<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO usluge — Logo varijante</title>
<style>
  body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 40px; }
  h1 { color: #E63946; margin-bottom: 40px; font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 32px; }
  .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 32px; }
  .card:hover { border-color: #E63946; }
  .card h2 { font-size: 0.75rem; color: #666; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px; }
  .logo-wrap { display: flex; align-items: center; justify-content: center; min-height: 120px; }
  .logo-wrap img { max-width: 100%; height: auto; }
  .variants { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }
  .badge { font-size: 0.7rem; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.4); color: #E63946; padding: 3px 10px; border-radius: 100px; }
</style>
</head>
<body>

<h1>YOLO usluge — Logo varijante (AI brain između)</h1>

<div class="grid">

  <div class="card">
    <h2>A1 — Neural network ikona</h2>
    <div class="logo-wrap">
      <img src="logo-ai-v1-neural.svg" alt="Logo A1">
    </div>
    <div class="variants">
      <span class="badge">Geometrijski</span>
      <span class="badge">Čist</span>
    </div>
  </div>

  <div class="card">
    <h2>A2 — Mozak outline</h2>
    <div class="logo-wrap">
      <img src="logo-ai-v2-brain.svg" alt="Logo A2">
    </div>
    <div class="variants">
      <span class="badge">Prepoznatljiv</span>
      <span class="badge">Direktan</span>
    </div>
  </div>

  <div class="card">
    <h2>A3 — Brain u kvadratu (circuit)</h2>
    <div class="logo-wrap">
      <img src="logo-ai-v3-circuit.svg" alt="Logo A3">
    </div>
    <div class="variants">
      <span class="badge">Tech</span>
      <span class="badge">Uočljiv</span>
    </div>
  </div>

  <div class="card">
    <h2>A4 — Mozak s vijugama (glow)</h2>
    <div class="logo-wrap">
      <img src="logo-ai-v4-spark.svg" alt="Logo A4">
    </div>
    <div class="variants">
      <span class="badge">Realistični mozak</span>
      <span class="badge">Premium</span>
    </div>
  </div>

</div>

</body>
</html>
